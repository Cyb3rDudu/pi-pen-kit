name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - 'pi-sliver/**'
  pull_request:
    branches: [main]
    paths:
      - 'pi-sliver/**'
  workflow_dispatch:

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        working-directory: pi-sliver
        run: npm install

      - name: Run tests
        working-directory: pi-sliver
        run: npx vitest run
